name: check

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: macos-latest
    env:
      MINT_PATH: ${{ github.workspace }}/mint
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

    - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
      with:
        python-version: '3.10'

    - name: Cache Mint packages
      uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
      with:
        path: ${{ env.MINT_PATH }}
        key: ${{ runner.os }}-mint-${{ hashFiles('**/Mintfile') }}
        restore-keys: ${{ runner.os }}-mint-

    - name: Setup Scripts Directory
      run: ./setup-scripts.sh

    - name: Setup check
      run: scripts/setup_check.sh

    - name: Style
      run: scripts/style.sh test-only

    - name: Whitespace
      run: scripts/check_whitespace.sh

    - name: Filename spaces
      run: scripts/check_filename_spaces.sh

    - name: Copyrights
      run: scripts/check_copyright.sh

    - name: Imports
      run: scripts/check_imports.swift
